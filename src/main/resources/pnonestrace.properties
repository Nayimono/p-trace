

# ── 공통 ──────────────────────────────────────────────────────────────────────
# 추적 서버/인스턴스 이름 (비어있으면 hostname 자동 수집)
trace.name=

# 로그 저장 루트 경로
log.dir=./pnonestrace-logs

# 롤링 파일 최대 크기 (MB)
log.rolling.max-file-mb=1

# 보관할 롤링 파일 개수
log.rolling.max-files=10

# 비동기 큐 최대 크기 (이 수 초과 시 버림)
log.queue.capacity=20000

# ── 로그 로테이션 ─────────────────────────────────────────────────────────────
# 완료된 로그를 보관할 아카이브 디렉토리 (설정 안하면 현재 디렉토리에 .1, .2 형식으로 보관)
# 예: ./pnonestrace-logs/archive 또는 /var/log/pnonestrace/archive
log.rolling.archive-dir=./pnonestrace-logs/complete

# 로테이션 전략: SIZE (크기 기반) 또는 TIME (시간 기반) 또는 REQUEST (요청 기반)
# SIZE: 파일 크기가 max-file-mb 초과 시 로테이션
# TIME: 시간 패턴에 따라 자동 로테이션 (DAILY = 매일, HOURLY = 매시간)
# REQUEST: N개 요청마다 자동 로테이션 (즉시 complete 이동)
log.rolling.strategy=REQUEST

# 시간 기반 로테이션 패턴: DAILY (일별) 또는 HOURLY (시간별)
# strategy=TIME 일 때만 적용됨
log.rolling.time-pattern=DAILY

# 요청 기반 로테이션: N개 요청마다 로테이션
# strategy=REQUEST 일 때만 적용됨 (기본: 100개 요청마다)
log.rolling.max-requests=100

# 로테이션 시 파일 압축 여부 (gzip 압축으로 디스크 공간 절약)
log.rolling.compress=false

# 아카이브 디렉토리 전체 크기 제한 (MB, 초과 시 오래된 로그부터 자동 삭제)
# 예: 1000MB = 1GB, 5000MB = 5GB
log.rolling.max-total-mb=1000

# 로그 포맷: TEXT | JSON | BOTH
# TEXT  → *.log 파일만 생성 (사람이 읽기 좋은 형탌)
# JSON  → *.jsonl 파일만 생성 (ELK / Splunk 연동)
# BOTH  → 둘 다 생성
log.format=BOTH

# 인코딩
log.encoding=UTF-8


# ── SQL 추적 ──────────────────────────────────────────────────────────────────
# SQL 추적 활성화
sql.enabled=true

# 이 ms 이상 걸린 쿼리에 SLOW 태그 부여
sql.slow-threshold-ms=1000

# 캡처할 호출 스택 깊이
sql.stack-depth=10

# ResultSet 최대 캡처 행 수 (텍스트 로그는 50행 제한, JSON은 이 값까지)
sql.result.max-rows=500

# SQL 결과 데이터 캡처 여부 (SELECT 쿼리의 실제 행 데이터)
# Scrollable ResultSet인 경우만 안전하게 커서를 되돌리며 읽음
# FORWARD_ONLY ResultSet은 metadata만 기록 (column 정보)
sql.result.capture-data=true

# ResultSet 비동기 캡처 대기 시간(ms)
sql.result.capture-wait-ms=500

# 특정 SQL 패턴 제외 (정규식, 여러 개는 ; 로 구분)
# 예: sql.exclude-pattern=SELECT 1;SHOW STATUS
sql.exclude-pattern=


# ── HTTP 추적 ─────────────────────────────────────────────────────────────────
# HTTP 추적 활성
http.enabled=true


# Request Body 캡처 여부 (POST/PUT 등)
http.capture.request-body=true

# Request Body 최대 캡처 크기 (bytes, 0 = 무제한)
http.capture.request-body-max-bytes=10240

# Response Body 캠처 여봀
http.capture.response-body=true

# Response Body 최대 캡처 크기 (bytes)
http.capture.response-body-max-bytes=10240

# 쿠키 캡처 여부
http.capture.cookies=true

# 세션 속성 캠처 여부 (주의: 민감 정보 포함 가능)
http.capture.session=true

# 세션 캡처 시 제외할 속성명 (;로 구분)
http.capture.session.exclude-keys=password;token;secret

# Request Header 캡처 여부
http.capture.request-headers=true

# Response Header 캡처 여부
http.capture.response-headers=true

# 제외할 URL 패턴 (정규식, ; 구분)
# 예: /actuator/.*;/health;/favicon.ico
# 로그인은 제외 (복잡한 세션 처리로 인한 NPE 방지)
http.exclude-url-pattern=/actuator/.*;/health;/favicon.ico;/static/.*;.*/login.*;.*/auth.*;.*/authenticate.*

# 이 ms 이상 걸린 요청에 SLOW 태그
http.slow-threshold-ms=3000

# 마스킹할 Header 이름 (민감 정보, ; 구분)
http.mask.headers=Authorization;Cookie;X-Api-Key;Set-Cookie;X-Auth-Token

# 마스킹할 파라미터/Body 키 이름 (; 구분) - JSON, XML, URL-encoded 모두 적용
http.mask.param-keys=password;passwd;pwd;secret;token;card_number;cvv;login_password;user_password;api_key;access_token;refresh_token;session_id;jsessionid

# 마스킹 대체 문자
http.mask.replace-value=*****

# 설정 재로드 주기(초) - 기본 10
pnones.trace.reload-seconds=10


# ── Syslog 전송 ───────────────────────────────────────────────────────────────
# Syslog 전송 활성화
syslog.enabled=false

# Syslog 서버 호스트
syslog.host=localhost

# Syslog 서버 포트
syslog.port=514

# Syslog 프로토콜: UDP | TCP
syslog.protocol=UDP

# Syslog facility (0-23): USER=1, LOCAL0=16, LOCAL1=17, ..., LOCAL7=23
syslog.facility=16

# Syslog 메시지 포맷: RFC3164 | RFC5424 | JSON
# RFC3164: 전통적인 BSD syslog 형식
# RFC5424: 새로운 IETF syslog 형식
# JSON: JSON 형식으로 전송
syslog.format=RFC5424

# Application 이름 (syslog APP-NAME 필드)
syslog.app-name=pnones-trace-agent

# 어떤 로그를 syslog로 전송할지: HTTP | SQL | BOTH | NONE
syslog.log-types=BOTH

# Syslog 전송 실패 시 재시도 횟수
syslog.retry-count=3

# Syslog 연결 타임아웃 (ms)
syslog.timeout-ms=5000

