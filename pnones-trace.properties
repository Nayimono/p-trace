# =============================================================================
#  PTrace Agent - 설정 파일 (간소화 버전)
#  
#  사용: -Dpnonestrace.config=/path/to/pnones-trace.properties
# =============================================================================

# ==================== 필수 설정 ====================

# 애플리케이션/서버 이름 (비어있으면 hostname 자동 수집)
# 예: prod-server, my-app, payment-service
trace.name=

# 로그 디렉토리
log.dir=./logs

# 로그 포맷 (JSON, TEXT, BOTH)
log.format=BOTH

# 인코딩
log.encoding=UTF-8


# ==================== 기능 활성화 ====================

# HTTP 요청 추적
http.enabled=true
http.capture.request-body=true
http.capture.response-body=true

# SQL 쿼리 추적
sql.enabled=true

# 모든 요청 필터에서 본문 감싸기 (InputStream 소비 문제 해결)
agent.wrap-request-in-all-filters=true


# ==================== 로그 로테이션 ====================

# 로그 파일 최대 크기 (MB)
log.rolling.max-file-mb=100

# 보관할 파일 최대 개수
log.rolling.max-files=10

# 로그 디렉토리 전체 최대 크기 (MB)
log.rolling.max-total-mb=1000

# 로테이션 전략
# SIZE  : 파일 크기 초과 시 로테이션
# TIME  : 시간 기반 (일일/시간별)
# REQUEST: 요청 수 기반
log.rolling.strategy=SIZE

# 완료된 로그 보관 디렉토리
log.rolling.archive-dir=./logs/complete

# WAS/Tomcat 종료 시 현재 로그 자동 아카이브
log.shutdown-archive=true


# ==================== 원격 전송 (선택사항) ====================

# === Syslog ===
syslog.enabled=false
syslog.host=localhost
syslog.port=514
syslog.protocol=UDP
syslog.format=RFC5424
syslog.log-types=BOTH
syslog.retry-count=3
syslog.timeout-ms=5000

# === HTTP API ===
http-api.enabled=false
http-api.endpoint=http://localhost:8080/logs
http-api.log-types=BOTH
http-api.async=true
http-api.batch-size=10
http-api.batch-delay-ms=1000
http-api.queue-size=1000
http-api.retry-count=3
http-api.timeout-ms=5000
http-api.auth-token=


# ==================== 모니터링 ====================

# 설정 자동 리로드 주기 (초, 기본: 10)
# properties 파일 변경 시 자동 반영되는 시간
pnones.trace.reload-seconds=10

# 디버깅 로그 활성화
# agent-debug.log 파일에 상세 정보 기록
trace.debug.enabled=false

# 디버깅 로그를 콘솔(System.err)로도 출력
# trace.debug.enabled=true일 때만 적용
trace.debug.print-stderr=false
